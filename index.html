<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRM Bank - Premium Banking</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            
            <!-- Initial Choice Section -->
            <div id="choice-section" class="fade-in">
                <div class="bank-logo">
                    <i class="fas fa-university"></i>
                    <h2>Welcome to BRM Bank</h2>
                    <p>Select an option to continue</p>
                </div>
                <div class="choice-container">
                    <button class="choice-btn" onclick="selectOption('login')">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>Login Account</span>
                    </button>
                    <button class="choice-btn secondary" onclick="selectOption('register')">
                        <i class="fas fa-user-plus"></i>
                        <span>Create Account</span>
                    </button>
                </div>
            </div>

            <!-- Auth Section (Initially Hidden) -->
            <div id="auth-section" class="hidden fade-in">
                <div class="back-nav" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> Back
                </div>
                <div class="bank-logo">
                    <i class="fas fa-university"></i>
                    <h2 id="form-title">BRM Bank Login</h2>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="number" id="accNo" placeholder="Account Number">
                    </div>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="accName" placeholder="Account Name">
                    </div>
                    
                    <div id="extra-fields" class="hidden">
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="text" id="accPhone" placeholder="Phone Number">
                        </div>
                        <div class="input-wrapper">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" id="accAddress" placeholder="Address">
                        </div>
                    </div>
                    <button class="btn-main" id="main-btn" onclick="handleAuth()">Login Now</button>
                    <p id="toggle-text">New to BRM? <a href="javascript:void(0)" onclick="toggleAuth()">Create Account</a></p>
                </div>
            </div>

            <!-- Dashboard Section -->
            <div id="dashboard" class="hidden fade-in">
                <div class="header">
                    <div class="user-info">
                        <span class="greeting">Welcome back,</span>
                        <h2 id="user-display">User</h2>
                    </div>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>

                <!-- Premium Bank Card -->
                <div class="balance-card">
                    <div class="card-inner">
                        <div class="card-top">
                            <span class="chip"></span>
                            <i class="fab fa-cc-visa"></i>
                        </div>
                        <div class="card-mid">
                            <p>Available Balance</p>
                            <h1><span id="balance-display">0.00</span> <small>TK</small></h1>
                        </div>
                        <div class="card-bottom">
                            <span>BRM PREMIUM MEMBER</span>
                        </div>
                    </div>
                </div>

                <p class="section-label">Quick Actions</p>
                <div class="actions">
                    <div class="action-item btn-deposit" onclick="showModal('deposit')">
                        <i class="fas fa-arrow-down"></i>
                        <span>Deposit</span>
                    </div>
                    <div class="action-item btn-withdraw" onclick="showModal('withdraw')">
                        <i class="fas fa-arrow-up"></i>
                        <span>Withdraw</span>
                    </div>
                    <div class="action-item btn-transfer" onclick="showModal('transfer')">
                        <i class="fas fa-exchange-alt"></i>
                        <span>Transfer</span>
                    </div>
                    <div class="action-item btn-history" onclick="displayTransactions()">
                        <i class="fas fa-history"></i>
                        <span>History</span>
                    </div>
                </div>

                <div id="transaction-history" class="history-section hidden slide-up">
                    <div class="history-header">
                        <h3>Recent Transactions</h3>
                        <i class="fas fa-clock"></i>
                    </div>
                    <ul id="history-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal" class="modal-overlay hidden">
        <div class="modal-content scale-up">
            <div class="modal-header">
                <h3 id="modal-title">Action</h3>
                <i class="fas fa-times" onclick="closeModal()"></i>
            </div>
            
            <div id="modal-body">
                <div class="input-wrapper">
                    <i class="fas fa-money-bill-wave"></i>
                    <input type="number" id="amount-input" placeholder="Enter Amount">
                </div>

                <div id="transfer-options" class="hidden">
                    <select id="transfer-type" onchange="toggleTransferFields()">
                        <option value="this-bank">BRM Bank (Internal)</option>
                        <option value="other-bank">External Bank</option>
                        <option value="mobile">MFS (bKash/Nagad)</option>
                    </select>

                    <div id="field-this-bank" class="hidden">
                        <input type="number" id="receiver-acc" placeholder="Receiver Account No">
                    </div>
                    <div id="field-other-bank" class="hidden">
                        <input type="text" id="other-bank-name" placeholder="Bank Name">
                        <input type="text" id="other-owner" placeholder="Owner Name">
                    </div>
                    <div id="field-mobile" class="hidden">
                        <select id="mobile-type">
                            <option value="bKash">bKash</option>
                            <option value="Nagad">Nagad</option>
                            <option value="Rocket">Rocket</option>
                        </select>
                        <input type="number" id="mobile-number" placeholder="MFS Number">
                    </div>
                </div>
            </div>

            <div class="modal-btns">
                <button class="btn-confirm" onclick="processAction()">Confirm Transaction</button>
                <button class="btn-cancel" onclick="closeModal()">Maybe Later</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
